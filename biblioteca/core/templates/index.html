{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Biblioteca</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 🔥 FUNDO */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("{% static 'img/fundo.png' %}") no-repeat center center;
            background-size: cover;
            filter: brightness(0.6); /* escurece levemente */
            z-index: -2;
        }

        /* 🔥 OVERLAY SUAVE */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* 🔥 MENU LATERAL */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }

        .sidebar a {
            text-decoration: none;
            color: #ddd;
            padding: 10px;
            display: block;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        /* 🔥 CONTEÚDO PRINCIPAL */
        .content {
            width: 100%;
            margin: 20px;
            padding: 30px;
            border-radius: 20px;

            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);

            color: white;
        }

        /* 🔥 CARDS */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 15px;
            color: white;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* 🔥 BOTÕES */
        .btn {
            border-radius: 10px;
        }

        /* 🔥 ALERTAS */
        .alert {
            border-radius: 10px;
            border: none;
        }

        /* 🔥 TABELA */
        table {
            border-radius: 10px;
            overflow: hidden;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        th, td {
            color: white !important;
        }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- MENU -->
    <div class="sidebar text-white p-3">
        <h4 class="mb-4">📚 Biblioteca</h4>

        <a href="/">🏠 Dashboard</a>
        <a href="/livros/">📖 Livros</a>
        <a href="/meus/">📚 Meus Empréstimos</a>

        {% if user.is_staff %}
        <a href="/admin/">⚙️ Admin</a>
        {% endif %}

        <hr>

        <a href="/sair/" class="btn btn-danger w-100 mt-2">Sair</a>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">

        <!-- 🔥 MENSAGENS -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

</div>

</body>
</html>

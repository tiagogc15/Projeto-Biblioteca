{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 🔥 FUNDO */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: url("{% static 'img/fundo.png' %}") no-repeat center;
            background-size: cover;
            filter: brightness(0.6);
            z-index: -2;
        }

        /* 🔥 OVERLAY */
        body::after {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }

        /* 🔥 SIDEBAR */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
        }

        .sidebar h4 {
            color: white;
        }

        .sidebar a {
            color: #ddd;
            display: block;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            transform: translateX(5px);
        }

        /* 🔥 CONTEÚDO */
        .content {
            width: 100%;
            margin: 20px;
            padding: 30px;
            border-radius: 20px;

            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            color: #fff;

            animation: fadeIn 0.6s ease-in-out;
        }

        /* 🔥 ANIMAÇÃO */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 🔥 CARDS */
        .card {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 15px;
            color: white;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* 🔥 BOTÕES */
        .btn {
            border-radius: 10px;
        }

        /* 🔥 ALERTAS */
        .alert {
            border-radius: 10px;
            border: none;
        }

        /* 🔥 TABELA */
        table {
            background: rgba(0,0,0,0.5);
            color: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            color: #fff !important;
            font-weight: bold;
        }

        td {
            color: #f1f1f1 !important;
        }

        /* 🌙 LIGHT MODE */
        .light-mode .content {
            background: rgba(255,255,255,0.95);
            color: #222;
        }

        .light-mode .sidebar {
            background: rgba(255,255,255,0.95);
        }

        .light-mode a {
            color: #222 !important;
        }

        .light-mode table {
            background: rgba(255,255,255,0.9);
        }

        .light-mode td,
        .light-mode th {
            color: #222 !important;
        }

        /* 📱 RESPONSIVO */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 10px;
            }

            .sidebar h4 {
                display: none;
            }

            .sidebar a span {
                display: none;
            }

            .content {
                margin: 10px;
                padding: 15px;
            }
        }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- MENU -->
    <div class="sidebar">

        <h4>📚 Biblioteca</h4>

        <a href="/">
            <i class="bi bi-house-door"></i> <span>Dashboard</span>
        </a>

        <a href="/livros/">
            <i class="bi bi-book"></i> <span>Livros</span>
        </a>

        <a href="/meus/">
            <i class="bi bi-journal-check"></i> <span>Empréstimos</span>
        </a>

        {% if user.is_staff %}
        <a href="/admin/">
            <i class="bi bi-gear"></i> <span>Admin</span>
        </a>
        {% endif %}

        <hr>

        <!-- 🌙 BOTÃO TEMA -->
        <button onclick="toggleTheme()" class="btn btn-light w-100 mb-2">
            <i class="bi bi-moon"></i>
        </button>

        <a href="/sair/" class="btn btn-danger w-100">
            Sair
        </a>

    </div>

    <!-- CONTEÚDO -->
    <div class="content">

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

</div>

<!-- 🌙 SCRIPT DARK MODE -->
<script>
function toggleTheme() {
    document.body.classList.toggle("light-mode");

    localStorage.setItem(
        "theme",
        document.body.classList.contains("light-mode") ? "light" : "dark"
    );
}

window.onload = function () {
    if (localStorage.getItem("theme") === "light") {
        document.body.classList.add("light-mode");
    }
};
</script>

</body>
</html>

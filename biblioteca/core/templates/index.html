{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            transition: 0.3s;
        }

        /* FUNDO */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: url("{% static 'img/fundo.png' %}") center/cover no-repeat;
            filter: blur(3px) brightness(0.6);
            z-index: -1;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: linear-gradient(180deg, #0d1b2a, #1b263b);
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            padding: 10px;
            margin-bottom: 8px;
            color: #ddd;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }

        /* BOTÕES */
        .btn-custom {
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.05);
        }

        /* CONTEÚDO */
        .content {
            width: 100%;
            margin: 15px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(6px);
            transition: 0.3s;
        }

        /* DARK MODE */
        .dark-mode {
            color: white;
        }

        .dark-mode .content {
            background: rgba(20, 20, 20, 0.95);
            color: white;
        }

        /* TABELA */
        .table {
            border-radius: 10px;
            overflow: hidden;
        }

        .dark-mode table {
            color: white;
        }

        /* DASHBOARD CARDS */
        .card-dashboard {
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.9);
            text-align: center;
        }

        .dark-mode .card-dashboard {
            background: rgba(30,30,30,0.95);
        }

        .numero {
            font-size: 28px;
            font-weight: bold;
        }

        .azul { color: #0d6efd; }
        .verde { color: #198754; }
        .vermelho { color: #dc3545; }

        .dark-mode h5 {
            color: #ccc;
        }

        /* BOTÃO DARK */
        .toggle-dark {
            background: #fff;
            color: #000;
            border-radius: 10px;
            border: none;
            padding: 8px;
            width: 100%;
            transition: 0.3s;
        }

        .dark-mode .toggle-dark {
            background: #333;
            color: #fff;
        }

    </style>
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h4>📚 Biblioteca</h4>

        <a href="/"><i class="bi bi-house"></i> Dashboard</a>
        <a href="/livros/"><i class="bi bi-book"></i> Livros</a>
        <a href="/meus/"><i class="bi bi-journal"></i> Empréstimos</a>

        <hr>

        <!-- BOTÃO DARK -->
        <button onclick="toggleDark()" class="toggle-dark" id="btnTema">
            🌙 Modo Escuro
        </button>

        <br><br>

        <a href="/sair/" class="btn btn-danger w-100 btn-custom">
            <i class="bi bi-box-arrow-right"></i> Sair
        </a>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">

        <!-- MENSAGENS -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

</div>

<!-- SCRIPT DARK MODE GLOBAL -->
<script>
function atualizarTexto() {
    const btn = document.getElementById("btnTema");

    if (document.body.classList.contains("dark-mode")) {
        btn.innerText = "☀️ Modo Claro";
    } else {
        btn.innerText = "🌙 Modo Escuro";
    }
}

function toggleDark() {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("tema", "dark");
    } else {
        localStorage.setItem("tema", "light");
    }

    atualizarTexto();
}

window.onload = function() {
    const tema = localStorage.getItem("tema");

    if (tema === "dark") {
        document.body.classList.add("dark-mode");
    }

    atualizarTexto();
};
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">

    <!-- MENU LATERAL -->
    <div class="bg-dark text-white p-3" style="width:250px; height:100vh;">
    <h4>📚 Biblioteca</h4>
    <hr>

    {% if user.is_authenticated %}
        <a href="/" class="text-white d-block mb-2">🏠 Dashboard</a>
        <a href="/livros/" class="text-white d-block mb-2">📖 Livros</a>
        <a href="/meus/" class="text-white d-block mb-2">📚 Meus Empréstimos</a>
        <a href="/sair/" class="btn btn-danger w-100 mt-3">Sair</a>
    {% else %}
        <a href="/login/" class="btn btn-success w-100 mb-2">Login</a>
        <a href="/registro/" class="btn btn-primary w-100">Criar Conta</a>
    {% endif %}

    <hr>

    <!-- Admin só aparece pra staff -->
    {% if user.is_staff %}
        <a href="/admin/" class="text-white d-block mt-2">⚙️ Admin</a>
    {% endif %}
</div>

    <!-- CONTEÚDO -->
    <div class="p-4" style="width:100%;">

    <!-- 🔥 MENSAGENS AQUI -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

</div>

</body>
</html>

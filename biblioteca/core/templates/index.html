{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ===== FUNDO ===== */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("{% static 'img/fundo.png' %}");
            background-size: cover;
            background-position: center;
            filter: blur(4px) brightness(0.5);
            z-index: -1;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: linear-gradient(180deg, #0d1b2a, #000);
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: #ccc;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        /* ANIMAÇÃO */
        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
            color: #fff;
        }

        /* ===== BOTÕES ===== */
        .btn {
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* ===== CONTEÚDO ===== */
        .content-area {
            width: 100%;
            margin: 10px;
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.85);
        }

        /* ===== TABELA ===== */
        table {
            border-radius: 15px;
            overflow: hidden;
            background: white;
        }

        thead {
            background: #0d1b2a;
            color: white;
        }

        tbody tr {
            transition: 0.2s;
        }

        tbody tr:hover {
            background: rgba(0,0,0,0.05);
        }

        /* ===== DARK MODE (AJUSTADO CORRETAMENTE) ===== */
        .dark-mode {
            color: white;
        }

        /* NÃO muda tabela */
        .dark-mode table {
            background: white !important;
        }

        /* texto dentro da tabela continua escuro */
        .dark-mode td,
        .dark-mode th {
            color: #000 !important;
        }

        /* textos fora da tabela */
        .dark-mode h1,
        .dark-mode h2,
        .dark-mode h3,
        .dark-mode h4,
        .dark-mode h5,
        .dark-mode p,
        .dark-mode span {
            color: #fff !important;
        }

        /* fundo do conteúdo */
        .dark-mode .content-area {
            background: rgba(0,0,0,0.6);
        }

        /* botão dark */
        .toggle-dark {
            background: #eee;
            border: none;
            border-radius: 10px;
            padding: 10px;
            width: 100%;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .toggle-dark:hover {
            transform: scale(1.05);
        }

        .dark-mode .toggle-dark {
            background: #333;
            color: white;
        }

    </style>
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h4 class="mb-4">📚 Biblioteca</h4>

        <a href="/"><i class="bi bi-house"></i> Dashboard</a>
        <a href="/livros/"><i class="bi bi-book"></i> Livros</a>
        <a href="/meus/"><i class="bi bi-journal"></i> Empréstimos</a>

        {% if user.is_staff %}
        <a href="/admin/"><i class="bi bi-gear"></i> Admin</a>
        {% endif %}

        <hr>

        <button onclick="toggleDark()" class="toggle-dark">
            🌙 Alternar modo
        </button>

        <a href="/sair/" class="btn btn-danger w-100">Sair</a>
    </div>

    <!-- CONTEÚDO -->
    <div class="content-area">

        <!-- MENSAGENS -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}

    </div>

</div>

<!-- SCRIPT DARK MODE -->
<script>
function toggleDark() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>

{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card {
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .btn {
            border-radius: 10px;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }
    </style>
</head>
<body>


<!-- 🔥 FUNDO PROFISSIONAL -->
<style>
body {
    margin: 0;
    padding: 0;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("{% static 'img/fundo.png' %}");
    background-size: cover;
    background-position: center;
    filter: blur(2px) brightness(0.7);
    z-index: -1;
}
</style>
    
<div class="d-flex">

    <!-- MENU LATERAL -->
    <div class="bg-dark text-white p-3" style="width:250px; height:100vh;"> 
        <h4 class="mb-3">📚 Biblioteca</h4>

        <a href="/" class="text-white d-block mb-2">🏠 Dashboard</a>
        <a href="/livros/" class="text-white d-block mb-2">📖 Livros</a>
        <a href="/meus/" class="text-white d-block mb-2">📚 Meus Empréstimos</a>

        {% if user.is_staff %}
        <a href="/admin/" class="text-white d-block mt-2">⚙️ Admin</a>
        {% endif %}

    <hr>

        <a href="/sair/" class="btn btn-danger w-100">Sair</a>
    </div>

    <!-- CONTEÚDO -->
    <div class="p-4" style="width:100%; background: rgba(255,255,255,0.6); border-radius:15px; backdrop-filter: blur(5px); margin:10px;">
         
        <!-- 🔥 MENSAGENS --> 
         {% if messages %} 
            {% for message in messages %} 
                <div class="alert alert-{{ message.tags }}">
                     {{ message }} 
                </div> 
            {% endfor %} 
        {% endif %} 
        
        {% block content %}{% endblock %} 
    </div>

</div>

</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h4>📚 Biblioteca</h4>

        <a href="/"><i class="bi bi-house"></i> Dashboard</a>
        <a href="/livros/"><i class="bi bi-book"></i> Livros</a>
        <a href="/meus/"><i class="bi bi-journal"></i> Empréstimos</a>

        <hr>

        <!-- BOTÃO DARK -->
        <button onclick="toggleDark()" class="toggle-dark" id="btnTema">
            🌙 Modo Escuro
        </button>

        <br><br>

        <a href="/sair/" class="btn btn-danger w-100 btn-custom">
            <i class="bi bi-box-arrow-right"></i> Sair
        </a>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">

        <!-- MENSAGENS -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

</div>

<!-- SCRIPT DARK MODE GLOBAL -->
<script>
function atualizarTexto() {
    const btn = document.getElementById("btnTema");

    if (document.body.classList.contains("dark-mode")) {
        btn.innerText = "☀️ Modo Claro";
    } else {
        btn.innerText = "🌙 Modo Escuro";
    }
}

function toggleDark() {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("tema", "dark");
    } else {
        localStorage.setItem("tema", "light");
    }

    atualizarTexto();
}

window.onload = function() {
    const tema = localStorage.getItem("tema");

    if (tema === "dark") {
        document.body.classList.add("dark-mode");
    }

    atualizarTexto();
};
</script>

</body>
</html>

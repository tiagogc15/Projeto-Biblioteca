<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex justify-content-center align-items-center" style="height:100vh;">
<div class="card p-4" style="width:350px;">
    <h3 class="text-center mb-3">📚 Biblioteca</h3>

    {% if erro %}
        <div class="alert alert-danger">{{ erro }}</div>
            {% endif %}
<h2>Login</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="text" name="username" class="form-control mb-2" placeholder="Usuário" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Senha" required>

        <button class="btn btn-primary w-100" type="submit">Entrar</button>
        <a href="/registro/" class="btn btn-link w-100 mt-2">Criar conta</a>
    
    </form>
</div>

</body>
</html>
